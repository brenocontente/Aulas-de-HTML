<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - First Class</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/5/56/Donald_Trump_official_portrait.jpg">
</head>
<body>

    <h1>Recuperar sua Senha</h1>
    <p>Insira o e-mail cadastrado. Enviaremos um link para você redefinir sua senha.</p>
    
    <form>
        <div>
            <label for="campo-email-recuperar">E-mail:</label>
            <input type="email" id="campo-email-recuperar" placeholder="Ex: nome@email.com" required>
        </div>
        
        <br>
        
        <button type="submit">Enviar Link de Recuperação</button>
    </form>

    <hr> 

    <!-- Links para navegação -->
    <p>
        <a href="index.html">Voltar para o Login</a> | 
        <a href="cadastro.html">Criar uma conta</a>
    </p>

</body>
</html>
