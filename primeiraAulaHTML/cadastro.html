<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - First Class</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/5/56/Donald_Trump_official_portrait.jpg">
</head>
<body>

    <h1>Criar uma Conta</h1>
    <p>Preencha os campos abaixo para se cadastrar no sistema.</p>
    
    <form>
        <!-- Campo Nome -->
        <div>
            <label for="campo-nome">Nome Completo:</label>
            <input type="text" id="campo-nome" placeholder="Digite seu nome completo" required>
        </div>

        <br>

        <!-- Campo E-mail -->
        <div>
            <label for="campo-email">E-mail:</label>
            <input type="email" id="campo-email" placeholder="Ex: nome@email.com" required>
        </div>

        <br>

        <!-- Campo Senha -->
        <div>
            <label for="campo-senha">Senha:</label>
            <input type="password" id="campo-senha" placeholder="Crie uma senha forte" required>
        </div>

        <br>

        <!-- Campo Confirmar Senha -->
        <div>
            <label for="campo-confirmar">Confirmar Senha:</label>
            <input type="password" id="campo-confirmar" placeholder="Digite a senha novamente" required>
        </div>

        <br>

        <!-- Botão de Enviar -->
        <button type="submit">Cadastrar</button>
    </form>

    <hr> 

    <!-- Link para voltar ao Login -->
    <p>
        Já tem uma conta? <a href="index.html">Acessar o Sistema</a>
    </p>

</body>
</html>
